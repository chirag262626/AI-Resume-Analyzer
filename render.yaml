services:
  - type: web
    name: ats-analyzer-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: CORS_ORIGINS
        value: "*" # Update this in Render Dashboard after frontend deployment
